<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data & AI | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            overflow: hidden; /* Keeps it clean and full-screen */
        }

        /* THE HERO CONTAINER */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FULL SCREEN VIDEO BACKGROUND */
        .hero video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* LAYERED OVERLAY FOR BETTER CONTRAST */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* NAVIGATION BAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); /* Modern blurry effect */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4da6ff;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .menu a:hover {
            color: #4da6ff;
        }

        /* HERO CONTENT */
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
        }

        .content h1 {
            font-size: clamp(3rem, 10vw, 7rem); /* Responsive giant text */
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(77, 166, 255, 0.3));
        }

        .content p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        /* MODERN BUTTON */
        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 18px 45px;
            background: #4da6ff;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(77, 166, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(77, 166, 255, 0.6);
            background: #fff;
            color: #000;
        }

    </style>
</head>
<body>

    <section class="hero">
        <video autoplay muted loop playsinline>
            <source src="assets/video.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

        <nav class="navbar">
            <div class="logo">DATA & AI</div>
            <div class="menu">
                <a href="#">Home</a>
                <a href="blog.html">Blog</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>

        <div class="content">
            <h1>FUTURE OF<br>INTELLIGENCE</h1>
            <p>Transforming complex data into decisive advantages through advanced AI modeling.</p>
            <a href="blog.html" class="btn">Explore the Blog</a>
        </div>
    </section>

</body>
</html>
