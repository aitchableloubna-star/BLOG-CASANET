<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data & AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* FULL SCREEN HERO */
.hero{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
background:black;
}

/* BIG VIDEO */
.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.30),
rgba(0,0,40,0.45),
rgba(0,0,0,0.70)
);
z-index:2;
}

/* NAVBAR */
.navbar{
position:absolute;
top:0;
left:0;
width:100%;
padding:25px 60px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}

.logo{
color:#4da6ff;
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

.menu{
display:flex;
gap:35px;
align-items:center;
}

.menu a,
.dropbtn{
color:white;
text-decoration:none;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.menu a:hover,
.dropbtn:hover{
color:#4da6ff;
}

/* DROPDOWN */
.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:35px;
right:0;
min-width:180px;
background:rgba(0,0,0,0.90);
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,120,255,0.20);
}

.dropdown-content a{
display:block;
padding:14px 18px;
color:white;
text-decoration:none;
}

.dropdown-content a:hover{
background:#0b1c4d;
color:#4da6ff;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* CENTER TEXT */
.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:4;
width:90%;
max-width:1000px;
}

.content h1{
font-size:90px;
color:#4da6ff;
text-shadow:0 0 30px rgba(77,166,255,0.60);
margin-bottom:20px;
}

.content p{
font-size:30px;
color:white;
line-height:1.4;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:35px;
padding:14px 34px;
background:#4da6ff;
color:white;
text-decoration:none;
border-radius:30px;
font-size:18px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#2f8fff;
}

/* MOBILE */
@media(max-width:768px){

.navbar{
padding:20px;
}

.logo{
font-size:20px;
}

.menu{
gap:18px;
}

.content h1{
font-size:52px;
}

.content p{
font-size:20px;
}

}
</style>
</head>

<body>

<section class="hero">

<!-- PUT YOUR VIDEO HERE -->
<video autoplay muted loop playsinline>
<source src="assets/video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- TOP MENU -->
<div class="navbar">

<div class="logo">Data & AI</div>

<div class="menu">
<a href="#">Home</a>

<div class="dropdown">
<span class="dropbtn">More</span>

<div class="dropdown-content">
<a href="about.html">About</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</div>

</div>
</div>

</div>

<!-- CENTER TITLE -->
<div class="content">
<h1>Data & AI</h1>
<p>Transformer la donnée en avantage décisionnel</p>
<a href="blog.html" class="btn">Explore Blog</a>
</div>

</section>

</body>
</html>
