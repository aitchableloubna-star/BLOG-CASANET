<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data & AI | CASANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            overflow: hidden; 
        }

        /* --- THE CURSOR FOLLOWER EFFECT --- */
        .cursor-follower {
            width: 25px;
            height: 25px;
            background-color: rgba(77, 166, 255, 0.4); /* Light Blue like requested */
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: fixed;
            pointer-events: none; /* Allows you to click things through the circle */
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out; /* Smooth movement */
            box-shadow: 0 0 20px rgba(77, 166, 255, 0.6);
        }

        /* IMAGE DE FOND */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* NAVIGATION */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 8%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 60px;
            width: auto;
            mix-blend-mode: screen; 
            filter: brightness(1.2);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #4da6ff;
        }

        /* CONTENU CENTRAL */
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
            width: 100%;
        }

        .content h1 {
            font-size: clamp(2rem, 8vw, 5.5rem); 
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            white-space: nowrap;
            background: linear-gradient(to bottom, #fff, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }

        .content p {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            max-width: 800px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 40px;
            background: #4da6ff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
        }

        /* Hide follower on touch devices (phones) */
        @media (max-width: 768px) {
            .cursor-follower { display: none; }
        }

    </style>
</head>
<body>

    <!-- Circle added here -->
    <div class="cursor-follower"></div>

    <section class="hero">
        
        <div class="overlay"></div>

        <nav class="navbar">
            <a href="index.html" class="logo-container">
                <img src="image_9b1d74.jpg" alt="Casanet Logo" class="logo-img">
            </a>
            
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>
            </div>
        </nav>

        <div class="content">
            <h1>DATA & AI</h1>
            <p>Solutions digitales innovantes pour transformer vos données en performance réelle.</p>
            <a href="blog.html" class="btn">Découvrir le Blog</a>
        </div>

    </section>

    <!-- Script to move the circle -->
    <script>
        const follower = document.querySelector('.cursor-follower');
        
        window.addEventListener('mousemove', (e) => {
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });
    </script>

</body>
</html>
