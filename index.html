<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data & AI | CASANET</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            overflow: hidden; 
        }

        /* FULL SCREEN BACKGROUND IMAGE */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Using your image.png as the big background */
            background-image: url('image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* DARK OVERLAY TO MAKE TEXT POP */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Adjust this to make the image darker/brighter */
            z-index: 1;
        }

        /* NAVIGATION BAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4da6ff;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #4da6ff;
        }

        /* CENTER CONTENT */
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 20px;
        }

        .content h1 {
            font-size: clamp(3rem, 10vw, 7.5rem);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 25px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }

        .content p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            max-width: 700px;
            margin: 0 auto;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            margin-top: 45px;
            padding: 18px 45px;
            background: #4da6ff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px; /* Clean, professional look */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <section class="hero">
        
        <div class="overlay"></div>

        <nav class="navbar">
            <div class="logo-text">CASANET</div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="blog.html">Blog</a>
                <a href="About.html">About</a>
                <a href="Contact.html">Contact</a>
            </div>
        </nav>

        <div class="content">
            <h1>DATA &<br>STRATÉGIE</h1>
            <p>Solutions digitales innovantes pour transformer vos données en performance réelle.</p>
            <a href="blog.html" class="btn">Découvrir le Blog</a>
        </div>

    </section>

</body>
</html>
