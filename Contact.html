<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Casanet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { 
            --bg: #030712;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #4da6ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #030712);
            background-image: linear-gradient(rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.85)), url('image_a9345f.jpg');
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAVIGATION */
        .nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(3, 7, 18, 0.6);
        }

        .logo-img {
            height: 50px;
            width: auto;
            display: block;
            filter: brightness(1.1) contrast(1.1);
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.95rem; 
            transition: 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* HERO SECTION */
        .hero {
            padding: 80px 8% 40px;
            text-align: left;
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .hero h1 span {
            color: var(--accent);
        }

        /* MAIN LAYOUT: CONTACT + FORM */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            padding: 0 8% 100px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: start;
        }

        /* LEFT SIDE: INFO CARDS */
        .info-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .contact-item:last-child { margin-bottom: 0; }

        .icon-wrapper {
            color: var(--text-muted);
        }

        .contact-text {
            font-size: 1.05rem;
            color: var(--text-muted);
        }

        /* RIGHT SIDE: FORM CARD */
        .form-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-card label {
            display: block;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group { margin-bottom: 25px; }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: #f8fafc;
            color: #1e293b;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(77, 166, 255, 0.1);
        }

        .btn-send {
            background: #0062ff;
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            width: fit-content;
        }

        .btn-send:hover {
            background: #0052d6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.3);
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .hero { text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="logo-container">
            <img src="image_9b1d74.jpg" alt="Casanet" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="About.html">About</a>
            <a href="Contact.html" class="active">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Contactez <span>Casanet</span></h1>
    </header>

    <main class="main-container">
        
        <div class="info-panel">
            <div class="contact-item">
                <div class="icon-wrapper"><i data-lucide="map-pin"></i></div>
                <div class="contact-text">Av. Annakhil, Immeuble Riad 1, Rabat</div>
            </div>
            
            <div class="contact-item">
                <div class="icon-wrapper"><i data-lucide="phone"></i></div>
                <div class="contact-text">05 37 54 83 00</div>
            </div>

            <div class="contact-item">
                <div class="icon-wrapper"><i data-lucide="mail"></i></div>
                <div class="contact-text">contact@casanet.ma</div>
            </div>
        </div>

        <div class="form-card">
            <form>
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" placeholder="">
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder=""></textarea>
                </div>

                <button type="submit" class="btn-send">Envoyer</button>
            </form>
        </div>

    </main>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
