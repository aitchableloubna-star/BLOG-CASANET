<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Casanet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { 
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #4da6ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: #030712;
            background-image: linear-gradient(rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.85)), url('image_a9345f.jpg');
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVIGATION */
        .nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            background: rgba(3, 7, 18, 0.6);
        }

        .logo-img { height: 45px; width: auto; filter: brightness(1.1); }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; opacity: 0.7;
        }
        .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }

        /* MAIN LAYOUT (Inspiré de ta photo) */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 80px 8%;
            max-width: 1300px;
            margin: 0 auto;
            align-items: start;
        }

        /* LEFT SIDE: INFO */
        .info-side h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .info-side h1 span {
            color: var(--accent);
        }

        .info-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item:last-child { margin-bottom: 0; }

        .info-item i { color: var(--text-muted); }
        .info-item p { font-size: 1.1rem; color: var(--text-main); }

        /* RIGHT SIDE: FORM (Le cadre blanc transparent de ta photo) */
        .form-side {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .contact-form { display: flex; flex-direction: column; gap: 25px; }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-group label { font-weight: 600; color: #fff; font-size: 1rem; opacity: 0.9; }
        
        .form-group input, .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .btn-send {
            background: #0062ff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-send:hover {
            background: #0052d6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.3);
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; gap: 40px; padding: 40px 8%; }
            .info-side h1 { font-size: 2.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html">
            <img src="image_9b1d74.jpg" alt="Casanet" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="About.html">About</a>
            <a href="Contact.html" class="active">Contact</a>
        </div>
    </nav>

    <main class="main-container">
        
        <div class="info-side">
            <h1>Contactez <span>Casanet</span></h1>
            
            <div class="info-card">
                <div class="info-item">
                    <i data-lucide="map-pin"></i>
                    <p>Av. Annakhil, Immeuble Riad 1, Rabat</p>
                </div>
                <div class="info-item">
                    <i data-lucide="phone"></i>
                    <p>05 37 54 83 00</p>
                </div>
                <div class="info-item">
                    <i data-lucide="mail"></i>
                    <p>contact@casanet.ma</p>
                </div>
            </div>
        </div>

        <div class="form-side">
            <form class="contact-form">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" placeholder="Votre nom complet">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Comment pouvons-nous vous aider ?"></textarea>
                </div>
                <button type="submit" class="btn-send">Envoyer</button>
            </form>
        </div>

    </main>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
